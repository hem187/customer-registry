services:
  - type: web
    name: customer-registry-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: customer-registry-demo-secret-change-in-prod
      - key: CLIENT_ORIGIN
        value: https://customer-registry-hem187.vercel.app
      # MONGO_URI intentionally omitted → falls back to MongoMemoryServer automatically
