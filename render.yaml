services:
  - type: web
    name: customer-registry-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # set this manually in the Render dashboard
      - key: JWT_SECRET
        sync: false          # set this manually in the Render dashboard
      - key: CLIENT_ORIGIN
        sync: false          # set to your Vercel URL after deploying the frontend
